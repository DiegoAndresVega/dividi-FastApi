services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gastos
      POSTGRES_PASSWORD: gastos
      POSTGRES_DB: gastos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gastos -d gastos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://gastos:gastos@db:5432/gastos
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-cambiar-en-produccion}
    ports:
      - "8000:8000"

volumes:
  pgdata:
